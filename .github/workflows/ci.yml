# ============================================================
# CI/CD — AguaFlow (Node.js + TypeScript)
# ============================================================

name: AguaFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node.js 20)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     aguaflow
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB:       aguaflowdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://aguaflow:${{ secrets.DB_PASSWORD }}@localhost:5433/aguaflowdb_test
      JWT_SECRET:   ${{ secrets.JWT_SECRET }}
      PORT:         3002

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Run tests with coverage
        run: npx jest --coverage
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-aguaflow
          path: backend/coverage/
          retention-days: 14
